<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1024px; height: 1024px; background: #0d1117; display: flex; align-items: center; justify-content: center; }

    .icon {
      width: 1024px;
      height: 1024px;
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* 배경 그리드 라인 */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(63,185,80,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(63,185,80,0.04) 1px, transparent 1px);
      background-size: 64px 64px;
    }

    /* 외곽 테두리 */
    .border-ring {
      position: absolute;
      inset: 48px;
      border: 2px solid rgba(63,185,80,0.15);
      border-radius: 32px;
    }

    .content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* 프롬프트 심볼 */
    .prompt {
      font-family: 'Courier New', monospace;
      font-size: 200px;
      font-weight: bold;
      color: #3fb950;
      line-height: 1;
      letter-spacing: -8px;
      text-shadow:
        0 0 40px rgba(63,185,80,0.6),
        0 0 80px rgba(63,185,80,0.3);
    }

    .cursor {
      display: inline-block;
      width: 96px;
      height: 200px;
      background: #3fb950;
      margin-left: 8px;
      vertical-align: bottom;
      box-shadow: 0 0 40px rgba(63,185,80,0.6);
      animation: none;
    }

    /* 타이틀 */
    .title {
      font-family: 'Courier New', monospace;
      font-size: 72px;
      font-weight: bold;
      color: #3fb950;
      letter-spacing: 12px;
      text-shadow: 0 0 20px rgba(63,185,80,0.4);
    }

    .subtitle {
      font-family: 'Courier New', monospace;
      font-size: 32px;
      color: #8b949e;
      letter-spacing: 6px;
    }
  </style>
</head>
<body>
  <div class="icon">
    <div class="grid"></div>
    <div class="border-ring"></div>
    <div class="content">
      <div class="prompt">&gt;_<span class="cursor"></span></div>
      <div class="title">THREADS</div>
      <div class="subtitle">// terminal</div>
    </div>
  </div>

  <script>
    // 안내 메시지
    console.log('1. 우클릭 → "다른 이름으로 저장" 또는');
    console.log('2. F12 → Console → html2canvas 방식으로 저장');
    console.log('또는 브라우저 줌을 100%로 맞추고 스크린샷 후 1024x1024로 크롭하세요.');
  </script>
</body>
</html>
